name: cero studio release

# Builds the cero binary for each platform, then bundles it inside the Tauri
# studio app and produces native installers (.msi, .dmg, .AppImage, .deb).
# Trigger: push tag like v0.2.0 → studio-release runs after the existing
# release.yml (which produces standalone cero-* binaries) so the binaries
# are also available standalone for users who want the CLI only.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cero_target: bun-linux-x64
            cero_out: dist/cero-linux
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            cero_target: bun-linux-arm64
            cero_out: dist/cero-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            cero_target: bun-darwin-arm64
            cero_out: dist/cero-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            cero_target: bun-darwin-x64
            cero_out: dist/cero-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cero_target: bun-windows-x64
            cero_out: dist/cero-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: studio/src-tauri -> target

      - name: Install Linux deps (Tauri)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install cero deps
        run: bun install
        working-directory: ${{ github.workspace }}

      - name: Build cero binary
        run: bun build src/cli/index.ts --compile --target=${{ matrix.cero_target }} --outfile=${{ matrix.cero_out }}
        working-directory: ${{ github.workspace }}

      - name: Stage cero as Tauri sidecar
        shell: bash
        run: |
          mkdir -p studio/src-tauri/binaries
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp dist/cero-windows.exe "studio/src-tauri/binaries/cero-${{ matrix.target }}.exe"
          else
            case "${{ matrix.cero_target }}" in
              bun-linux-x64)     SRC=dist/cero-linux ;;
              bun-linux-arm64)   SRC=dist/cero-linux-arm64 ;;
              bun-darwin-arm64)  SRC=dist/cero-macos-arm64 ;;
              bun-darwin-x64)    SRC=dist/cero-macos-x64 ;;
            esac
            cp "$SRC" "studio/src-tauri/binaries/cero-${{ matrix.target }}"
            chmod +x "studio/src-tauri/binaries/cero-${{ matrix.target }}"
          fi

      - name: Install studio deps
        run: bun install
        working-directory: studio

      - name: Build studio + bundle (tauri-action)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: studio
          tagName: ${{ github.ref_name }}
          releaseName: "cero studio ${{ github.ref_name }}"
          releaseBody: |
            cero studio — desktop app with the full cero self-learning agent embedded.
            See README for setup. Standalone CLI binaries are in the matching `v*` release of the cero repo.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload standalone cero binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.cero_out }}
